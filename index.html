<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>ようこそようこそ株式会社｜業務効率化・自動化サポート</title>
  <style>
    html,
    body {
      width: 100%;
      min-width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;
      background: #ffffff;
    }

    .app-frame {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #1f3d2b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      transition: opacity 0.24s ease, visibility 0.24s ease;
    }

    .loading.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    @supports (-webkit-touch-callout: none) {
      .app-shell {
        height: -webkit-fill-available;
      }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading" aria-live="polite">読み込み中...</div>

  <main class="app-shell" aria-label="ようこそようこそ株式会社｜業務効率化・自動化サポート">
    <iframe
      id="appFrame"
      class="app-frame"
      src="https://script.google.com/macros/s/AKfycbx7e-5TT5TSgzNmnYR6eDMnbIXRQi-obSAyklOHigNPMQOrSLSqwgeffvsPXrcaApUt/exec"
      referrerpolicy="strict-origin-when-cross-origin"
      title="ようこそようこそ株式会社｜業務効率化・自動化サポート"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-downloads"
      allow="clipboard-read; clipboard-write; fullscreen"
      loading="eager">
    </iframe>
  </main>

  <script>
    // GitHub Pages側は1ページ固定のSPAシェルとして動かす。
    // iframe内リンクの top 遷移を sandbox で抑止し、親ページが変なURLへ飛ばないようにする。
    (function () {
      const frame = document.getElementById('appFrame');
      const loading = document.getElementById('loading');

      function hideLoading() {
        if (loading) loading.classList.add('is-hidden');
      }

      if (frame) {
        frame.addEventListener('load', hideLoading);
      }

      window.addEventListener('pageshow', hideLoading);

      // 直接 /xxx にアクセスされてもPages側はこの1ページに留める。
      // 既に表示中のSPAシェルを壊さないため、履歴だけ正規URLへ寄せる。
      const expectedPath = '/yokoso-it-lp/';
      if (location.pathname !== expectedPath) {
        history.replaceState(null, document.title, expectedPath + location.search + location.hash);
      }
    })();
  </script>
</body>
</html>
