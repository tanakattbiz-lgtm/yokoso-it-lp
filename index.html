<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>ようこそようこそ株式会社｜業務効率化・自動化サポート</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    .iframe-root {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #ffffff;
    }

    .app-frame {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    @supports (-webkit-touch-callout: none) {
      .iframe-root {
        height: -webkit-fill-available;
      }
    }
  </style>
</head>
<body>
  <main class="iframe-root">
    <iframe
      id="appFrame"
      class="app-frame"
      src="https://script.google.com/macros/s/AKfycbx7e-5TT5TSgzNmnYR6eDMnbIXRQi-obSAyklOHigNPMQOrSLSqwgeffvsPXrcaApUt/exec"
      referrerpolicy="strict-origin-when-cross-origin"
      title="ようこそようこそ株式会社｜業務効率化・自動化サポート"
      allow="clipboard-read; clipboard-write; fullscreen"
      loading="eager">
    </iframe>
  </main>
</body>
</html>
